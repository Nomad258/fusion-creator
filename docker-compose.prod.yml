version: '3.8'

services:
  app:
    image: ghcr.io/nomad258/fusion-creator:latest
    container_name: 2r-fusion-app
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./prisma/dev.db
      - NEXTAUTH_SECRET=xt7Kp9mQ2vR8nW3jL6bY1cA4fH0dS5eU7gI2oP8qT3wX6zA
      - NEXTAUTH_URL=http://srv1378351.hstgr.cloud
    volumes:
      - fusion_data:/app/prisma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {if (r.statusCode >= 400) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: 2r-fusion-nginx
    ports:
      - "80:80"
    command:
      - /bin/sh
      - -c
      - "echo 'server { listen 80; server_name _; client_max_body_size 50m; location / { proxy_pass http://app:3000; proxy_http_version 1.1; proxy_set_header Upgrade $$http_upgrade; proxy_set_header Connection upgrade; proxy_set_header Host $$host; proxy_set_header X-Real-IP $$remote_addr; proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for; proxy_cache_bypass $$http_upgrade; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  fusion_data:
    driver: local
